name: Site scrape (one-time)
on:
  workflow_dispatch:
  push:
    paths:
      - 'scripts/site-scrape/**'

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - name: Fetch extras
        run: bash scripts/site-scrape/extras.sh
      - name: Commit dump back to branch
        run: |
          git config user.name "site-scrape-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A scrape-dump
          git commit -m "Add scrape dump of existing bumperballchicago.com" || echo "nothing to commit"
          git pull --rebase origin "${GITHUB_REF_NAME}" || true
          git push origin "HEAD:${GITHUB_REF_NAME}"
