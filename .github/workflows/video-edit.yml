name: Video edit
on:
  push:
    paths:
      - 'scripts/video-edit/**'

permissions:
  contents: write

jobs:
  edit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Install ffmpeg
        run: sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg fonts-crosextra-carlito python3-pil > /dev/null
      - name: Run video step
        run: |
          bash scripts/video-edit/run.sh
      - name: Commit results back to branch
        run: |
          git config user.name "video-edit-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A scrape-dump/video-frames bumperball-site/assets/video || true
          git commit -m "Video edit pass output" || echo "nothing to commit"
          git pull --rebase origin "${GITHUB_REF_NAME}" || true
          git push origin "HEAD:${GITHUB_REF_NAME}"
